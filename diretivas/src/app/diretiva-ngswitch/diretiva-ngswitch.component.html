<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand">Navbar</a>
    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarNavDropdown"
      aria-controls="navbarNavDropdown"
      aria-expanded="false"
      aria-label="Toggle navigation"
    >
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNavDropdown">
      <ul class="navbar-nav">
        <li class="nav-item">
          <a
            class="nav-link"
            aria-current="page"
            [class.active]="aba == 'home'"
            (click)="aba = 'home'"
            >Home</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            [class.active]="aba == 'mapa'"
            (click)="aba = 'mapa'"
            >Mapa</a
          >
        </li>
        <li class="nav-item">
          <a
            class="nav-link"
            [class.active]="aba == 'lista'"
            (click)="aba = 'lista'"
            >Lista</a
          >
        </li>
        <li class="nav-item dropdown">
          <a
            class="nav-link dropdown-toggle"
            id="navbarDropdownMenuLink"
            role="button"
            data-bs-toggle="dropdown"
            aria-expanded="false"
          >
            Dropdown link
          </a>
          <ul class="dropdown-menu" aria-labelledby="navbarDropdownMenuLink">
            <li><a class="dropdown-item">Action</a></li>
            <li><a class="dropdown-item">Another action</a></li>
            <li><a class="dropdown-item">Something else here</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>
<!--ver qual a aba que tá ativa e verificar o valor da aba-->
<div class="container" [ngSwitch]="aba">
  <!--verificar o valor dessa aba,
  no caso saber se é mapa, lista ou home, pra daí mostrar as informações -->
  <!--isso é uma forma de ter vários if e else-->
  <p *ngSwitchCase="'mapa'">Modo Mapa ativado</p>
  <!--if-->
  <p *ngSwitchCase="'lista'">Modo Lista ativado</p>
  <!--if-->
  <!--se for default (padrão) não precisa de valor-->
  <p *ngSwitchDefault>Home</p>
  <!--else-->
</div>

<h5>Removendo o * e usando template</h5>

<div class="container" [ngSwitch]="aba">
  <ng-template [ngSwitchCase]="'mapa'">
    <p>Modo Mapa ativado</p>
  </ng-template>
  <ng-template [ngSwitchCase]="'lista'">
    <p>Modo Lista ativado</p>
  </ng-template>
  <ng-template [ngSwitchCase]="'home'" ngSwitchDefault>
    <p>Home</p>
  </ng-template>
</div>
